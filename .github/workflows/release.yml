name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GO_VERSION: '1.22'

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          BINARY_NAME=todo-tracker-${{ matrix.goos }}-${{ matrix.goarch }}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME=${BINARY_NAME}.exe
          fi
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }} -X main.commit=${{ github.sha }} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" -o dist/${BINARY_NAME} ./cmd/todo

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: todo-tracker-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Display structure of downloaded files
        run: ls -R dist

      - name: Prepare release assets
        run: |
          mkdir -p release
          find dist -type f \( -name "todo-tracker-*" -o -name "*.exe" \) -exec mv {} release/ \;
          cd release
          for file in todo-tracker-linux-*; do
            if [ -f "$file" ]; then
              tar -czvf ${file}.tar.gz ${file}
              rm ${file}
            fi
          done
          for file in todo-tracker-darwin-*; do
            if [ -f "$file" ]; then
              tar -czvf ${file}.tar.gz ${file}
              rm ${file}
            fi
          done
          for file in todo-tracker-windows-*.exe; do
            if [ -f "$file" ]; then
              zip ${file%.exe}.zip ${file}
              rm ${file}
            fi
          done
          ls -la

      - name: Generate changelog
        id: changelog
        run: |
          # 从CHANGELOG.md提取当前版本的变更日志
          if [ -f CHANGELOG.md ]; then
            # 提取当前版本（去除v前缀）
            VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
            # 提取版本变更内容
            CHANGELOG=$(awk "/## \\[${VERSION}\\]/{flag=1;next}/## \\[/{flag=0}flag" CHANGELOG.md)
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGELOG" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "changelog=Release ${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release/*
          generate_release_notes: true

  homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    if: github.repository == 'mxihan/todo-tracker' && !contains(github.ref_name, '-')
    steps:
      - name: Update Homebrew tap
        run: |
          # TODO: 配置Homebrew tap仓库
          # 此步骤需要配置相应的密钥和仓库权限
          echo "Homebrew formula update would happen here"

  docker:
    name: Build and push Docker image
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max